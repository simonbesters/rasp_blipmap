server {
    server_name rasp.besters.digital;

    root /root/RASPViewer/raspviewer/dist;
    index index.html;

    # New data structure: /data/latest/ serves from /data/rasp/latest/
    # This MUST come before the SPA catch-all
    location /data/latest/ {
        alias /data/rasp/latest/;
        autoindex off;
        add_header Cache-Control "public, max-age=60, s-maxage=60";
        add_header Access-Control-Allow-Origin "*";
    }

    # Serve static files (SPA fallback to index.html)
    location / {
        try_files $uri $uri/ /index.html;
        autoindex off;
    }

    # Strip NL4KMGFS prefix and serve data from NL+* symlinks
    location ~ ^/NL4KMGFS/(NL\+.*)$ {
        alias /root/RASPViewer/$1;
    }

    # Direct access to NL+* symlinks (fallback)
    location ~ ^/NL\+ {
        root /root/RASPViewer;
        try_files $uri $uri/ =404;
    }

    # OGN relay reverse proxy
    location /api/v1/aircraft {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3, s-maxage=3";
    }

    # Proxy API and CGI requests to blipmaps.nl
    location /api/ {
        proxy_pass https://blipmaps.nl;
        proxy_set_header Host blipmaps.nl;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    location /cgi-bin/ {
        proxy_pass https://blipmaps.nl;
        proxy_set_header Host blipmaps.nl;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/rasp.besters.digital/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/rasp.besters.digital/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = rasp.besters.digital) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen 8080;
    server_name rasp.besters.digital;
    return 404; # managed by Certbot


}
